name: Python CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: python -m pip install pytest

      - name: Ejecutar pruebas (CI)
        env:
          PYTHONPATH: .
        run: python -m pytest